name: Build and Deploy ETF Microservices

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repository structure
        run: |
          echo "Contenido de la raíz:"
          ls -la

          echo "Dockerfiles encontrados:"
          find . -maxdepth 3 -type f -name "Dockerfile"

          echo "Archivos pom.xml encontrados:"
          find . -maxdepth 3 -type f -name "pom.xml"

      - name: Build etf-bff Docker image
        run: |
          docker build \
            -f etf-bff/Dockerfile \
            -t etf-bff:test \
            etf-bff

      - name: Build etf-consumidor Docker image
        run: |
          docker build \
            -f etf-consumidor/Dockerfile \
            -t etf-consumidor:test \
            etf-consumidor

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag Docker images
        if: github.event_name == 'push'
        run: |
          docker tag \
            etf-bff:test \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          docker tag \
            etf-consumidor:test \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

      - name: Push Docker images
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

      - name: Add SSH key
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" \
            | tr -d '\r' \
            > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

      - name: Test SSH connection
        if: github.event_name == 'push'
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} \
            "echo 'Conexión SSH correcta con EC2'"

      - name: Deploy ETF microservices in EC2
        if: github.event_name == 'push'
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=========================================="
          echo "Iniciando despliegue de ETF"
          echo "=========================================="

          echo "Iniciando sesión en Docker Hub..."

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

          echo "Descargando imágenes..."

          docker pull \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          docker pull \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

          echo "Eliminando contenedores anteriores..."

          docker rm -f etf-bff || true
          docker rm -f etf-consumidor || true

          echo "Liberando puerto 8080..."

          CONTENEDORES_8080=$(docker ps -q --filter publish=8080)

          if [ -n "$CONTENEDORES_8080" ]; then
            docker rm -f $CONTENEDORES_8080
          fi

          echo "Liberando puerto 8081..."

          CONTENEDORES_8081=$(docker ps -q --filter publish=8081)

          if [ -n "$CONTENEDORES_8081" ]; then
            docker rm -f $CONTENEDORES_8081
          fi

          echo "Preparando red app-network..."

          docker network inspect app-network >/dev/null 2>&1 || \
          docker network create app-network

          echo "Conectando RabbitMQ a app-network..."

          docker network connect app-network rabbitmq1 2>/dev/null || true
          docker network connect app-network rabbitmq2 2>/dev/null || true

          echo "Verificando Oracle Wallet..."

          if [ ! -f /home/ec2-user/oracle-wallet/tnsnames.ora ]; then
            echo "No se encontró /home/ec2-user/oracle-wallet/tnsnames.ora"
            exit 1
          fi

          echo "Levantando etf-bff..."

          docker run -d \
            --name etf-bff \
            --restart unless-stopped \
            --network app-network \
            -p 8080:8080 \
            -e RABBITMQ_ADDRESSES="rabbitmq1:5672,rabbitmq2:5672" \
            -e RABBITMQ_USERNAME="appuser" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            -e JWT_ISSUER_URI="${{ secrets.JWT_ISSUER_URI }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          echo "Levantando etf-consumidor..."

          docker run -d \
            --name etf-consumidor \
            --restart unless-stopped \
            --network app-network \
            -p 8081:8081 \
            -v /home/ec2-user/oracle-wallet:/app/wallet:ro \
            -e TNS_ADMIN="/app/wallet" \
            -e RABBITMQ_ADDRESSES="rabbitmq1:5672,rabbitmq2:5672" \
            -e RABBITMQ_USERNAME="appuser" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            -e JWT_ISSUER_URI="${{ secrets.JWT_ISSUER_URI }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

          esperar_endpoint() {
            NOMBRE="$1"
            URL="$2"
            MAX_INTENTOS="$3"

            echo "Esperando respuesta de $NOMBRE..."

            for INTENTO in $(seq 1 "$MAX_INTENTOS"); do
              echo "Intento $INTENTO de $MAX_INTENTOS para $NOMBRE"

              if curl \
                --fail \
                --silent \
                --show-error \
                "$URL"; then

                echo ""
                echo "$NOMBRE está funcionando."
                return 0
              fi

              if [ "$(docker inspect -f '{{.State.Running}}' "$NOMBRE" 2>/dev/null)" != "true" ]; then
                echo "$NOMBRE se detuvo durante el inicio."
                docker logs --tail 300 "$NOMBRE" || true
                return 1
              fi

              sleep 10
            done

            echo "$NOMBRE no respondió dentro del tiempo esperado."
            docker logs --tail 300 "$NOMBRE" || true
            return 1
          }

          echo "Estado inicial de los contenedores:"
          docker ps -a

          esperar_endpoint \
            "etf-bff" \
            "http://localhost:8080/api/bff/estado" \
            12

          esperar_endpoint \
            "etf-consumidor" \
            "http://localhost:8081/api/mensajes/estado" \
            18

          echo "Últimos logs de etf-bff:"
          docker logs --tail 50 etf-bff

          echo "Últimos logs de etf-consumidor:"
          docker logs --tail 50 etf-consumidor

          echo "=========================================="
          echo "Despliegue finalizado correctamente"
          echo "=========================================="

          EOF
