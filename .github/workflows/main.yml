name: Build and Push Docker Image Transporte

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Iniciar sesión en Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Construir la imagen Docker
      - name: Build Docker image
        run: |
          docker build \
            -f transporte/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/transporte:latest \
            transporte

      # 4. Publicar la imagen en Docker Hub
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/transporte:latest

      # 5. Configurar credenciales AWS
      - name: Set up AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 6. Configurar clave SSH
      - name: Add SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      # 7. Probar conexión con EC2
      - name: Test SSH connection
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} \
            "echo 'Conexión SSH correcta'"

      # 8. Desplegar aplicación en EC2
      - name: Deploy application in EC2
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "Iniciando despliegue de Transporte..."

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

          echo "Descargando nueva imagen..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/transporte:latest

          echo "Eliminando contenedor anterior..."
          docker stop transporte || true
          docker rm transporte || true

          echo "Creando red de la aplicación..."
          docker network create app-network || true

          echo "Conectando rabbitmq1 a app-network..."
          docker network connect app-network rabbitmq1 || true

          echo "Conectando rabbitmq2 a app-network..."
          docker network connect app-network rabbitmq2 || true

          echo "Levantando contenedor Transporte..."
          docker run -d \
            --name transporte \
            --restart unless-stopped \
            --network app-network \
            -p 8080:8080 \
            -v /mnt/efs:/app/efs \
            -v /home/ec2-user/oracle-wallet:/app/wallet \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_SESSION_TOKEN="${{ secrets.AWS_SESSION_TOKEN }}" \
            -e RABBITMQ_ADDRESSES="rabbitmq1:5672,rabbitmq2:5672" \
            -e RABBITMQ_USERNAME="appuser" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/transporte:latest

          echo "Contenedores activos:"
          docker ps

          echo "Red app-network:"
          docker network inspect app-network

          echo "Despliegue finalizado."

          EOF
