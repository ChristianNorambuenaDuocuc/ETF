name: Build and Deploy ETF Microservices

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ==================================================
      # 1. DESCARGAR EL REPOSITORIO
      # ==================================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==================================================
      # 2. MOSTRAR ESTRUCTURA
      # ==================================================
      - name: Show repository structure
        run: |
          echo "Contenido de la raíz:"
          ls -la

          echo "Dockerfiles encontrados:"
          find . -maxdepth 3 -type f -name "Dockerfile"

          echo "Archivos pom.xml encontrados:"
          find . -maxdepth 3 -type f -name "pom.xml"

      # ==================================================
      # 3. CONSTRUIR ETF-BFF
      # ==================================================
      - name: Build etf-bff Docker image
        run: |
          docker build \
            -f etf-bff/Dockerfile \
            -t etf-bff:test \
            etf-bff

      # ==================================================
      # 4. CONSTRUIR ETF-CONSUMIDOR
      # ==================================================
      - name: Build etf-consumidor Docker image
        run: |
          docker build \
            -f etf-consumidor/Dockerfile \
            -t etf-consumidor:test \
            etf-consumidor

      # ==================================================
      # 5. LOGIN DOCKER HUB
      # ==================================================
      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ==================================================
      # 6. ETIQUETAR IMÁGENES
      # ==================================================
      - name: Tag Docker images
        if: github.event_name == 'push'
        run: |
          docker tag \
            etf-bff:test \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          docker tag \
            etf-consumidor:test \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

      # ==================================================
      # 7. PUSH ETF-BFF
      # ==================================================
      - name: Push etf-bff image
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

      # ==================================================
      # 8. PUSH ETF-CONSUMIDOR
      # ==================================================
      - name: Push etf-consumidor image
        if: github.event_name == 'push'
        run: |
          docker push \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

      # ==================================================
      # 9. CONFIGURAR CLAVE SSH
      # ==================================================
      - name: Add SSH key
        if: github.event_name == 'push'
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" \
            | tr -d '\r' \
            > ~/.ssh/id_rsa

          chmod 600 ~/.ssh/id_rsa

      # ==================================================
      # 10. PROBAR CONEXIÓN SSH
      # ==================================================
      - name: Test SSH connection
        if: github.event_name == 'push'
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} \
            "echo 'Conexión SSH correcta con EC2'"

      # ==================================================
      # 11. DESPLEGAR EN EC2
      # ==================================================
      - name: Deploy ETF microservices in EC2
        if: github.event_name == 'push'
        run: |
          ssh \
            -i ~/.ssh/id_rsa \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'EOF'

          set -e

          echo "=========================================="
          echo "Iniciando despliegue de ETF"
          echo "=========================================="

          echo "Iniciando sesión en Docker Hub..."

          echo "${{ secrets.DOCKERHUB_TOKEN }}" | \
          docker login \
            -u "${{ secrets.DOCKERHUB_USERNAME }}" \
            --password-stdin

          echo "Descargando imagen etf-bff..."

          docker pull \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          echo "Descargando imagen etf-consumidor..."

          docker pull \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

          echo "Eliminando contenedores anteriores..."

          docker stop etf-bff || true
          docker rm etf-bff || true

          docker stop etf-consumidor || true
          docker rm etf-consumidor || true

          # ==================================================
          # LIBERAR PUERTO 8080
          # ==================================================
          echo "Liberando puerto 8080..."

          CONTENEDORES_8080=$(docker ps -q --filter publish=8080)

          if [ -n "$CONTENEDORES_8080" ]; then
            docker stop $CONTENEDORES_8080
            docker rm $CONTENEDORES_8080
          fi

          # ==================================================
          # LIBERAR PUERTO 8081
          # ==================================================
          echo "Liberando puerto 8081..."

          CONTENEDORES_8081=$(docker ps -q --filter publish=8081)

          if [ -n "$CONTENEDORES_8081" ]; then
            docker stop $CONTENEDORES_8081
            docker rm $CONTENEDORES_8081
          fi

          echo "Preparando red app-network..."

          docker network create app-network || true

          echo "Conectando rabbitmq1..."

          docker network connect \
            app-network \
            rabbitmq1 || true

          echo "Conectando rabbitmq2..."

          docker network connect \
            app-network \
            rabbitmq2 || true

          echo "Preparando Oracle Wallet..."

          mkdir -p /home/ec2-user/oracle-wallet

          echo "Levantando etf-bff..."

          docker run -d \
            --name etf-bff \
            --restart unless-stopped \
            --network app-network \
            -p 8080:8080 \
            -e RABBITMQ_ADDRESSES="rabbitmq1:5672,rabbitmq2:5672" \
            -e RABBITMQ_USERNAME="appuser" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            -e JWT_ISSUER_URI="${{ secrets.JWT_ISSUER_URI }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-bff:latest

          echo "Levantando etf-consumidor..."

          docker run -d \
            --name etf-consumidor \
            --restart unless-stopped \
            --network app-network \
            -p 8081:8081 \
            -v /home/ec2-user/oracle-wallet:/app/wallet:ro \
            -e ORACLE_URL="${{ secrets.ORACLE_URL }}" \
            -e ORACLE_USERNAME="${{ secrets.ORACLE_USERNAME }}" \
            -e ORACLE_PASSWORD="${{ secrets.ORACLE_PASSWORD }}" \
            -e TNS_ADMIN="/app/wallet" \
            -e RABBITMQ_ADDRESSES="rabbitmq1:5672,rabbitmq2:5672" \
            -e RABBITMQ_USERNAME="appuser" \
            -e RABBITMQ_PASSWORD="${{ secrets.RABBITMQ_PASSWORD }}" \
            -e JWT_ISSUER_URI="${{ secrets.JWT_ISSUER_URI }}" \
            ${{ secrets.DOCKERHUB_USERNAME }}/etf-consumidor:latest

          echo "Esperando inicio de los microservicios..."

          sleep 30

          echo "Estado de los contenedores:"

          docker ps -a

          echo "Verificando contenedor etf-bff..."

          if [ "$(docker inspect -f '{{.State.Running}}' etf-bff 2>/dev/null)" != "true" ]; then
            echo "El contenedor etf-bff no está activo."

            docker logs \
              --tail 200 \
              etf-bff || true

            exit 1
          fi

          echo "Comprobando endpoint etf-bff..."

          if ! curl \
            --fail \
            --silent \
            --show-error \
            http://localhost:8080/api/bff/estado; then

            echo "etf-bff no respondió correctamente."

            docker logs \
              --tail 200 \
              etf-bff || true

            exit 1
          fi

          echo ""
          echo "etf-bff está funcionando."

          echo "Verificando contenedor etf-consumidor..."

          if [ "$(docker inspect -f '{{.State.Running}}' etf-consumidor 2>/dev/null)" != "true" ]; then
            echo "El contenedor etf-consumidor no está activo."

            docker logs \
              --tail 200 \
              etf-consumidor || true

            exit 1
          fi

          echo "Comprobando endpoint etf-consumidor..."

          if ! curl \
            --fail \
            --silent \
            --show-error \
            http://localhost:8081/api/mensajes/estado; then

            echo "etf-consumidor no respondió correctamente."

            docker logs \
              --tail 200 \
              etf-consumidor || true

            exit 1
          fi

          echo ""
          echo "etf-consumidor está funcionando."

          echo "Últimos logs de etf-bff:"

          docker logs \
            --tail 50 \
            etf-bff

          echo "Últimos logs de etf-consumidor:"

          docker logs \
            --tail 50 \
            etf-consumidor

          echo "=========================================="
          echo "Despliegue finalizado correctamente"
          echo "=========================================="

          EOF
