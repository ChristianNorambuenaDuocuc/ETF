

spring.application.name=ETF-CONSUMIDOR

server.port=8081

# ORACLE
spring.datasource.url=${ORACLE_URL}
spring.datasource.username=${ORACLE_USERNAME}
spring.datasource.password=${ORACLE_PASSWORD}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ORACLE WALLET
spring.datasource.hikari.data-source-properties.oracle.net.tns_admin=${TNS_ADMIN:/app/wallet}

# RABBITMQ
spring.rabbitmq.addresses=${RABBITMQ_ADDRESSES:localhost:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# IDAAS
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI}

# SWAGGER
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# LOGS
logging.level.org.springframework.amqp=INFO
logging.level.org.hibernate.SQL=DEBUG